name: AWS ECR Push & EC2 Deploy
on:
  push:
    branches: [ main ] # 'main' 또는 'master' 등 주력 브랜치 이름으로 변경해주세요.

jobs:
  build-push-deploy:
    name: Build, Push to ECR, and Deploy to EC2
    runs-on: ubuntu-latest
    environment: production # 선택 사항: GitHub 환경을 사용하여 배포 환경을 정의하고 비밀을 관리합니다.
    steps:
      # 1. 코드 체크아웃
      - name: Check out repository code
        uses: actions/checkout@v6

      # 2. AWS 자격 증명 설정
      # AWS ECR에 이미지를 푸시하기 위해 필요합니다.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2 # 본인의 AWS 리전으로 변경해주세요.

      # 3. Amazon ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Docker 이미지 빌드 및 ECR에 푸시
      # buildx 설정을 포함하여 멀티-플랫폼 빌드를 지원합니다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_NAME: sample-server
          # --- 여기에서 버전을 수동으로 변경하여 테스트할 수 있습니다 (예: v2, my-test-feature) ---
          IMAGE_VERSION: latest  #수정 요청 금지
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t $ECR_REGISTRY/$IMAGE_NAME:latest \
            -t $ECR_REGISTRY/$IMAGE_NAME:${{ github.sha }} \
            -t $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_VERSION \
            --push .

      # 5. EC2에 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ec2-user # EC2 인스턴스 사용자 이름 (예: ubuntu, ec2-user)
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. AWS 자격 증명 파일 생성 (보안상 IAM 역할 사용을 권장합니다)
            # ~/.aws 디렉토리가 없으면 생성합니다.
            mkdir -p ~/.aws
            # GitHub Secrets에서 AWS 자격 증명을 읽어와 credentials 파일에 씁니다.
            echo "[default]" > ~/.aws/credentials
            echo "aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
            echo "aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
            echo "region = ap-northeast-2" >> ~/.aws/credentials
            
            # 2. AWS ECR에 로그인합니다.
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            # 3. 배포할 최신 이미지를 pull 합니다.
            docker pull ${{ steps.login-ecr.outputs.registry }}/sample-server:${{ github.sha }}
            
            # 4. 기존에 실행 중인 컨테이너가 있다면 중지하고 제거합니다.
            docker stop sample-server || true
            docker rm sample-server || true
            
            # 5. 새로운 이미지로 컨테이너를 실행합니다.
            docker run -d --name sample-server --restart always -p 3000:3000 \
              --env-file /home/ec2-user/sample-server.env \
              ${{ steps.login-ecr.outputs.registry }}/sample-server:${{ github.sha }}
            
            # 6. 컨테이너가 정상적으로 실행되었는지 확인합니다.
            echo "Waiting 10 seconds for container health check..."
            sleep 10
            
            if [ ! "$(docker ps -q -f name=sample-server)" ]; then
              echo "❌ Container failed to start. Displaying logs:"
              docker logs sample-server
              exit 1
            fi
            
            echo "✅ Container is running successfully."
            # 7. 사용하지 않는 Docker 이미지 정리 (선택 사항)
            docker image prune -f
