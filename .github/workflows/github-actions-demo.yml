name: Node.js CI/CD
on:
  push:
    branches: [ main ] # 실제 사용 중인 main 브랜치만 지정
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 288947333749.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: sample-server # 리포지토리 이름을 여기에 직접 입력하세요.

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Generate version tag
        id: version
        run: |
         echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
    
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2
    
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
    
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image 
        env:
          IMAGE_TAG: ${{ steps.version.outputs.version }}
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest \
            --push .

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    if: github.ref == 'refs/heads/main' # master를 main으로 수정
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to EC2 instance
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_PUBLIC_IP }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        script: |
          # Step 1: Configure AWS CLI (보안을 위해 EC2에 IAM 역할을 연결하는 것을 강력히 권장합니다)
          # 이 스크립트는 매 배포마다 자격 증명을 새로 설정하여 `aws configure`가 필요 없도록 합니다.
          mkdir -p ~/.aws
          echo "[default]" > ~/.aws/credentials
          echo "aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
          echo "region = ap-northeast-2" >> ~/.aws/credentials

          # Step 2: Login to ECR
          aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

          # Step 3: Pull the new image
          docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }}

          # Step 4: Stop and remove the old container
          docker stop sample-server || true
          docker rm sample-server || true

          # Step 5: Run the new container
          # 데이터베이스를 사용하지 않으므로, 별도의 .env 파일 없이 컨테이너를 실행합니다.
          # NestJS 앱은 PORT 환경 변수가 없으면 3000번 포트를 기본값으로 사용합니다.
          docker run -d --name sample-server -p 3000:3000 \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }}

          # Step 6: Health Check
          echo "Waiting 10 seconds for container health check..."
          sleep 10
          if [ ! "$(docker ps -q -f name=sample-server)" ]; then
            echo "❌ Container failed to start. Displaying logs:"
            docker logs sample-server
            exit 1
          fi
          echo "✅ Container is running successfully."

          # Step 7: Clean up old images
          docker image prune -a -f
